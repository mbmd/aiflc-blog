baseURL = "https://mbmd.github.io/aiflc-blog/"
locale = "en-us"
title = "AIFLC Blog"
theme = "PaperMod"
paginate = 10

[params]
  mainSections = ["engineering", "product", "methodology", "open-source", "tutorials", "changelog"]
  env = "production"
  title = "AIFLC Blog"
  description = "Engineering, methodology, and product insights from the AI-* Family lifecycle system"
  author = "Mohammad Maheri"
  DateFormat = "January 2, 2006"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  hidemeta = false
  hideSummary = false
  showtoc = true

  [params.homeInfoParams]
    Title = "Your entire delivery lifecycle. AI-driven. IDE-native. Free."
    Content = "AIFLC is an open-source chain of injectable workflow packages that guide AI agents through every delivery phase — from raw idea to governed code — with human approval at every gate.\n\nThis blog covers how we build it, why it works, and what we're learning along the way."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/mbmd/AIFLC"
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/mohammad-maheri-8399565b"

  [params.editPost]
    URL = "https://github.com/mbmd/aiflc-blog/tree/main/content"
    Text = "Suggest Changes"
    appendFilePath = true

[menu]
  [[menu.main]]
    identifier = "engineering"
    name = "Engineering"
    url = "/engineering/"
    weight = 10
  [[menu.main]]
    identifier = "product"
    name = "Product"
    url = "/product/"
    weight = 20
  [[menu.main]]
    identifier = "methodology"
    name = "Methodology"
    url = "/methodology/"
    weight = 30
  [[menu.main]]
    identifier = "open-source"
    name = "Open Source"
    url = "/open-source/"
    weight = 40
  [[menu.main]]
    identifier = "tutorials"
    name = "Tutorials"
    url = "/tutorials/"
    weight = 50
  [[menu.main]]
    identifier = "changelog"
    name = "Changelog"
    url = "/changelog/"
    weight = 60
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 70

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokai"
